<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFCS Firing Unit</title>

    <style>
        body {
            margin: 0;
            padding: 24px;
            background-color: #0b0f0b;
            color: #00ff66;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .shell {
            max-width: 760px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 2px solid #00ff66;
            padding-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            letter-spacing: 2px;
        }

        .nav-button,
        .unit-button {
            background-color: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }

        .nav-button:hover,
        .unit-button:hover {
            background-color: #003311;
        }

        .panel {
            border: 2px solid #00ff66;
            background-color: #111;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,255,102,0.1);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-item {
            border: 1px solid #00ff66;
            padding: 12px;
            background-color: #000;
        }

        .summary-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: bold;
            overflow-wrap: anywhere;
        }

        .unit-list {
            display: grid;
            gap: 10px;
        }

        .unit-card {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #00ff66;
            padding: 12px;
            background-color: #000;
        }

        .unit-card.active {
            background-color: #003311;
        }

        .unit-name {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .placeholder {
            margin-top: 18px;
            color: #99ffbb;
            opacity: 0.8;
            line-height: 1.5;
        }

        @media (max-width: 560px) {
            .top-bar,
            .unit-card {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="sync.js"></script>
</head>
<body>
    <div class="shell">
        <div class="top-bar">
            <h1>FIRING UNIT</h1>
            <button class="nav-button" onclick="window.location.href='index.html'">SETUP</button>
        </div>

        <div class="panel">
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">WEAPON SYSTEM</div>
                    <div class="summary-value" id="weaponSystemDisplay">---</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">ASSIGNED UNIT</div>
                    <div class="summary-value" id="assignedUnitDisplay">---</div>
                </div>
            </div>

            <div class="unit-list" id="unitList"></div>

            <div class="placeholder">
                Firing unit data link, fire orders, acknowledgements, and unit-specific firing solutions will be built here.
            </div>
        </div>
    </div>

    <script>
        function getFireUnits() {
            const fireUnitSize = parseInt(localStorage.getItem("fireUnitSize"), 10) || 1;
            const labels = ["A", "B", "C", "D"];
            const units = [];

            for (let index = 0; index < fireUnitSize && index < labels.length; index++) {
                const label = labels[index];
                units.push({
                    label,
                    callsign: localStorage.getItem(`firingUnit${label}Callsign`) || "",
                    location: localStorage.getItem(`firingUnit${label}Location`) || localStorage.getItem(`unit${label}Location`) || "---",
                    altitude: localStorage.getItem(`firingUnit${label}Altitude`) || localStorage.getItem(`unit${label}Altitude`) || "---",
                });
            }

            return units;
        }

        function setAssignedUnit(label) {
            localStorage.setItem("assignedFiringUnit", label);
            window.location.href = "dfcs.html";
        }

        function renderFiringUnitPage() {
            const weaponSystem = localStorage.getItem("weaponSystem") || "M777A2";
            const units = getFireUnits();
            const assignedUnit = localStorage.getItem("assignedFiringUnit") || (units[0] && units[0].label) || "A";

            document.getElementById("weaponSystemDisplay").innerText = weaponSystem;
            document.getElementById("assignedUnitDisplay").innerText = `Unit ${assignedUnit}`;
            document.getElementById("unitList").innerHTML = units.map(unit => `
                <div class="unit-card ${unit.label === assignedUnit ? "active" : ""}">
                    <div>
                        <div class="unit-name">Unit ${unit.label}</div>
                        <div>Callsign: ${unit.callsign || "---"}</div>
                        <div>Location: ${unit.location}</div>
                        <div>Altitude: ${unit.altitude} m</div>
                    </div>
                    <button class="unit-button" onclick="setAssignedUnit('${unit.label}')">SELECT</button>
                </div>
            `).join("");
        }

        renderFiringUnitPage();
    </script>
</body>
</html>
